<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient for contrast if needed, but we keep it transparent for favicon -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="30%" stop-color="#e0e0e0" stop-opacity="0.5" />
      <stop offset="70%" stop-color="#999999" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#555555" stop-opacity="0.1" />
    </linearGradient>
    
    <linearGradient id="metalBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#b8b8b8" />
      <stop offset="70%" stop-color="#555555" />
      <stop offset="100%" stop-color="#222222" />
    </linearGradient>

    <linearGradient id="pixelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#888888" />
    </linearGradient>
  </defs>

  <!-- Group with subtle drop shadow for depth -->
  <g filter="drop-shadow(0px 8px 16px rgba(0,0,0,0.3))">
    
    <!-- Dissolving Pixel Blocks - Top Left -->
    <g fill="url(#pixelGrad)">
      <rect x="110" y="80" width="24" height="24" rx="4" />
      <rect x="140" y="60" width="32" height="32" rx="4" />
      <rect x="180" y="40" width="20" height="20" rx="3" />
      <rect x="120" y="120" width="40" height="40" rx="6" />
      <rect x="170" y="110" width="28" height="28" rx="4" />
      <rect x="210" y="90" width="24" height="24" rx="4" />
      <rect x="100" y="170" width="48" height="48" rx="6" />
      <rect x="160" y="160" width="36" height="36" rx="5" />
      <rect x="210" y="140" width="32" height="32" rx="5" />
      <rect x="110" y="230" width="28" height="28" rx="4" />
    </g>

    <!-- Dissolving Pixel Blocks - Bottom Left -->
    <g fill="url(#pixelGrad)">
      <rect x="110" y="408" width="24" height="24" rx="4" />
      <rect x="140" y="420" width="32" height="32" rx="4" />
      <rect x="180" y="452" width="20" height="20" rx="3" />
      <rect x="120" y="352" width="40" height="40" rx="6" />
      <rect x="170" y="374" width="28" height="28" rx="4" />
      <rect x="210" y="398" width="24" height="24" rx="4" />
      <rect x="100" y="294" width="48" height="48" rx="6" />
      <rect x="160" y="316" width="36" height="36" rx="5" />
      <rect x="210" y="340" width="32" height="32" rx="5" />
      <rect x="110" y="254" width="28" height="28" rx="4" />
    </g>

    <!-- Main Metallic/Glass Chevron Arrow -->
    <path d="M 230 140 
             L 380 246 
             C 395 256, 395 266, 380 276 
             L 230 382 
             C 215 392, 200 382, 210 366 
             L 320 266 
             C 325 261, 325 251, 320 246 
             L 210 146 
             C 200 130, 215 120, 230 140 Z" 
          fill="url(#glassGrad)" 
          stroke="url(#metalBorder)" 
          stroke-width="12" 
          stroke-linejoin="round" />

    <!-- Bright Gloss Reflection Line -->
    <path d="M 240 160 L 360 251 C 368 256, 368 261, 360 266 L 330 290" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="6" 
          stroke-linecap="round" 
          opacity="0.8" />
          
    <path d="M 230 170 L 250 185" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="4" 
          stroke-linecap="round" 
          opacity="0.5" />
  </g>
</svg>
